name: production e2e

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      base_url:
        description: Deployed site URL to test
        required: true
        default: https://battlebrothers.academy
      wait_for_current_commit:
        description: Wait for the target URL to serve this branch commit before testing
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: production-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-e2e-target:
    name: production e2e target
    runs-on: ubuntu-latest
    outputs:
      base-url: ${{ steps.target.outputs.base-url }}
      should-wait-for-current-commit: ${{ steps.target.outputs.should-wait-for-current-commit }}

    steps:
      - id: target
        name: resolve production e2e target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            base_url="${{ inputs.base_url }}"
            should_wait_for_current_commit="${{ inputs.wait_for_current_commit }}"
          else
            base_url="https://battlebrothers.academy"
            should_wait_for_current_commit="true"
          fi

          echo "base-url=${base_url}" >> "$GITHUB_OUTPUT"
          echo "should-wait-for-current-commit=${should_wait_for_current_commit}" >> "$GITHUB_OUTPUT"
          echo "Production e2e target: ${base_url}"
          echo "Wait for current commit: ${should_wait_for_current_commit}"

  wait-for-production-deploy:
    name: wait for production deploy
    if: >-
      ${{
        needs.production-e2e-target.outputs.should-wait-for-current-commit == 'true'
      }}
    needs: [production-e2e-target]
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1

      - name: wait for stable production readiness
        run: >-
          node scripts/wait-for-production-deploy.mjs
          --commit ${{ github.sha }}
          --web "${{ needs.production-e2e-target.outputs.base-url }}"
          --timeout-ms 1800000
          --interval-ms 15000
          --request-timeout-ms 10000
          --required-stable-checks 2

  production-e2e-browser:
    name: production e2e browser
    needs: [production-e2e-target, wait-for-production-deploy]
    if: >-
      ${{
        always() &&
        needs.production-e2e-target.result == 'success' &&
        (
          needs.wait-for-production-deploy.result == 'success' ||
          needs.wait-for-production-deploy.result == 'skipped'
        )
      }}
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --ipc=host
    timeout-minutes: 30

    env:
      CI: true
      HOME: /root
      PLAYWRIGHT_BASE_URL: ${{ needs.production-e2e-target.outputs.base-url }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: run production browser e2e
        run: pnpm run test:e2e:production

      - name: upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: production-playwright-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 7

  production-e2e:
    name: production e2e
    if: always()
    needs: [production-e2e-target, wait-for-production-deploy, production-e2e-browser]
    runs-on: ubuntu-latest

    steps:
      - name: assert production e2e jobs passed
        run: |
          if [ "${{ needs.production-e2e-target.result }}" != "success" ]; then
            echo "production-e2e-target result: ${{ needs.production-e2e-target.result }}"
            exit 1
          fi

          if [ "${{ needs.wait-for-production-deploy.result }}" != "success" ] && [ "${{ needs.wait-for-production-deploy.result }}" != "skipped" ]; then
            echo "wait-for-production-deploy result: ${{ needs.wait-for-production-deploy.result }}"
            exit 1
          fi

          if [ "${{ needs.production-e2e-browser.result }}" != "success" ]; then
            echo "production-e2e-browser result: ${{ needs.production-e2e-browser.result }}"
            exit 1
          fi
