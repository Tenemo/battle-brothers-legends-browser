name: production e2e

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-manual-production-mode:
    name: validate manual production mode
    if: >-
      ${{
        github.event_name == 'workflow_dispatch'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: reject misleading non-production manual runs
        run: |
          case "${{ github.ref_name }}" in
            master|main)
              echo "Manual production e2e is allowed for production branch '${{ github.ref_name }}'."
              ;;
            *)
              echo "Manual production e2e always targets https://battlebrothers.academy."
              echo "Branch '${{ github.ref_name }}' is not a production branch, so its tests can disagree with the live deployment."
              echo "Run this workflow from master/main after the deploy you want to verify."
              exit 1
              ;;
          esac

  wait-for-production-deploy:
    name: wait for production deploy
    if: >-
      ${{
        github.event_name != 'workflow_dispatch' ||
        github.ref_name == 'master' ||
        github.ref_name == 'main'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1

      - name: wait for stable production readiness
        run: >-
          node scripts/wait-for-production-deploy.ts
          --commit ${{ github.sha }}
          --web https://battlebrothers.academy
          --timeout-ms 1800000
          --interval-ms 15000
          --request-timeout-ms 10000
          --required-stable-checks 2

  production-e2e-browser:
    name: production e2e browser
    needs: [validate-manual-production-mode, wait-for-production-deploy]
    if: >-
      ${{
        always() &&
        (
          (
            github.event_name != 'workflow_dispatch' &&
            needs.wait-for-production-deploy.result == 'success'
          ) ||
          (
            github.event_name == 'workflow_dispatch' &&
            needs.validate-manual-production-mode.result == 'success' &&
            needs.wait-for-production-deploy.result == 'success'
          )
        )
      }}
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --ipc=host
    timeout-minutes: 45

    env:
      CI: true
      HOME: /root
      PLAYWRIGHT_BASE_URL: https://battlebrothers.academy

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24.14.1
          cache: pnpm

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: run production browser e2e
        # Intentional: production coverage stays full-suite against the
        # deployed site. The package script lowers worker count for
        # determinism instead of narrowing this to smoke coverage.
        run: pnpm run test:e2e:production

      - name: upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: production-playwright-artifacts
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 7

  production-e2e:
    name: production e2e
    if: always()
    needs: [validate-manual-production-mode, wait-for-production-deploy, production-e2e-browser]
    runs-on: ubuntu-latest

    steps:
      - name: assert production e2e jobs passed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ needs.validate-manual-production-mode.result }}" != "success" ]; then
            echo "validate-manual-production-mode result: ${{ needs.validate-manual-production-mode.result }}"
            exit 1
          fi

          if [ "${{ needs.wait-for-production-deploy.result }}" != "success" ]; then
            echo "wait-for-production-deploy result: ${{ needs.wait-for-production-deploy.result }}"
            exit 1
          fi

          if [ "${{ needs.production-e2e-browser.result }}" != "success" ]; then
            echo "production-e2e-browser result: ${{ needs.production-e2e-browser.result }}"
            exit 1
          fi
