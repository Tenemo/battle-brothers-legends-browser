[build]
command = "pnpm build:netlify"
edge_functions = ".netlify/generated-edge-functions"
publish = "dist"

[build.environment]
NODE_VERSION = "22"
PNPM_VERSION = "10.33.0"

[dev]
command = "pnpm dev"
port = 8888
targetPort = 5173
framework = "#custom"

[functions]
included_files = [
  "node_modules/@fontsource/source-sans-3/files/source-sans-3-latin-400-normal.woff",
  "node_modules/@fontsource/source-sans-3/files/source-sans-3-latin-600-normal.woff",
  "node_modules/@fontsource/source-sans-3/files/source-sans-3-latin-700-normal.woff",
  "public/game-icons/**/*",
]

[[edge_functions]]
function = "build-seo"
path = "/*"
excludedPath = [
  "/assets/*",
  "/favicon/*",
  "/game-icons/*",
  "/robots.txt",
  "/seo/*",
  "/sitemap.xml",
  "/social/*",
]

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Cross-Origin-Opener-Policy = "same-origin"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
Permissions-Policy = "accelerometer=(), autoplay=(), camera=(), display-capture=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none';"

[[headers]]
for = "/"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/game-icons/*"
[headers.values]
Cache-Control = "public, max-age=604800, stale-while-revalidate=31536000"

[[redirects]]
from = "/index.html"
to = "/"
status = 301
force = true
